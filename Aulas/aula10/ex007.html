<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Somando números</title>
  <style>
    body {
        font-family: Arial, Helvetica, sans-serif;

        font-size: 1.5em;
    }

    #num {
        padding-bottom: 20px;
    }

    #res {
        background-color: lightgray;
    }
  </style>
</head>
<body>
    <h1>Somando Valores</h1>

    <div id="num">
        <label for="txtn1">
            <input type="number" name="txtn1" id="txtn1"> +
        </label>
        <label for="txtn2">
            <input type="number" name="txtn2" id="txtn2">
        </label>
        <!-- Sim eu usei label e nem lembro se tá certo -->
        <input type="button" value="Somar" id="btn">
      </div>  

    <div id="res">
        Resultado
    </div>
    
    <script>
        btn.addEventListener('click', somar)

        function somar() {
            var tn1 = document.querySelector('#txtn1')
            var tn2 = document.querySelector('#txtn2')
            var btn = document.querySelector('#btn')
            var res = document.querySelector('#res')

            var n1 = Number(tn1.value)
            var n2 = Number(tn2.value)
            var s = n1 + n2

            res.innerHTML = `A soma de ${n1} e ${n2} é igual a: <strong>${s}</strong>`
        }
    </script>
</body>
</html>
