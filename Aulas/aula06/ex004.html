<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JavaScript</title>
  <style>
    body {
        background-color: lightblue;
    }

    .tit {
        font-family: Arial, Helvetica, sans-serif;
        text-align: center;
    }
  </style>
</head>
<body>

    <script>
        var nome = window.prompt('Qual é o seu nome?')
        document.write(`<h1 class="tit">Olá, <strong>${nome}</strong>. <br>Seu nome tem ${nome.length} letras!</h1>`)
        document.write(`<h1 class="tit">Em maiúsculo ele é ${nome.toUpperCase()}.</h1>`)
        document.write(`<h1 class="tit">E em minúsculo é ${nome.toLowerCase()}.</h1>`)
    </script>
</body>
</html>
