<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contador</title>
  <link rel="stylesheet" href="estilos/style.css">
</head>
<body>
    <header>
        <h1>Contador</h1>
    </header>
    <main>
        <section>
            <div>
                <p>
                    <label for="ini">
                        Início: <input type="number" name="ini" id="ini">
                    </label>
                </p>
                <p>
                    <label for="fim">
                        Fim: <input type="number" name="fim" id="fim">
                    </label>
                </p>
                <p>
                    <label for="pas">
                        Passo: <input type="number" name="pas" id="pas">
                    </label>
                </p>
                <p>
                    <label for="btn">
                        <input type="button" value="Contar" id="btn">
                    </label>
                </p>
            </div>
            <div id="cam">
                Insira os números...
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; CursoemVídeo</p>
    </footer>

    <script src="scripts/script.js"></script>
</body>
</html>
